name: CI

# Автоматические ворота (ARCHITECTURE.md §8): типы + линт + тесты на каждый push и PR.
# Ветку main защитить в настройках GitHub: merge только при зелёном CI.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm ci ставит зависимости; postinstall выполнит `prisma generate`
      # (генерация клиента НЕ требует подключения к БД).
      - run: npm ci

      # tsc --noEmit + next lint + vitest (тестам БД не нужна — env заданы в vitest.config).
      - run: npm run check
